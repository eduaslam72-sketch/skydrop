<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SkyCart — Ready-to-List Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:24px}
.header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.header h1{font-size:22px;font-weight:800;color:#38bdf8}
.header p{font-size:13px;color:#64748b;margin-top:2px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.card h2{font-size:14px;font-weight:700;color:#38bdf8;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:12px;color:#94a3b8;font-weight:600;display:block;margin-bottom:4px}
select,input{width:100%;padding:9px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;margin-bottom:12px}
select:focus,input:focus{border-color:#38bdf8}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;width:100%}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,233,.35)}
.btn-success{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-success:hover:not(:disabled){transform:translateY(-1px)}
.btn-warning{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;background:rgba(14,165,233,.15);color:#38bdf8;margin-right:6px}
.badge-green{background:rgba(5,150,105,.15);color:#34d399}
.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#0f172a;color:#64748b;padding:8px 10px;text-align:left;border-bottom:1px solid #334155;font-weight:600}
td{padding:7px 10px;border-bottom:1px solid #1e293b;vertical-align:middle}
tr:hover td{background:rgba(56,189,248,.04)}
.log{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:12px;height:160px;overflow-y:auto;font-size:11px;font-family:monospace;margin-top:12px}
.log-ok{color:#34d399}.log-err{color:#f87171}.log-info{color:#38bdf8}.log-warn{color:#fbbf24}
.progress-bar{height:6px;background:#0f172a;border-radius:99px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#0369a1,#38bdf8);border-radius:99px;transition:width .3s;width:0%}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#preview{display:none}
.preview-tabs{display:flex;gap:8px;margin-bottom:12px}
.tab-btn{padding:7px 16px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#94a3b8;font-size:12px;cursor:pointer;font-weight:600}
.tab-btn.active{background:#0369a1;color:#fff;border-color:#0369a1}
.tab-content{display:none}
.tab-content.active{display:block}
pre{background:#0f172a;border:1px solid #1e293b;border-radius:8px;padding:14px;font-size:11px;white-space:pre-wrap;word-break:break-word;line-height:1.6;max-height:400px;overflow-y:auto;color:#cbd5e1}
.stat{font-size:28px;font-weight:800;color:#38bdf8}
.stat-label{font-size:11px;color:#64748b;margin-top:2px}
</style>
</head>
<body>
<div class="header">
  <svg width="40" height="58" viewBox="0 0 66 76"><polygon points="33,2 61,22 33,70 5,22" fill="#0c4a6e"/><polygon points="33,10 55,24 33,60 11,24" fill="#0369a1"/><polygon points="33,18 47,26 33,50 19,26" fill="#0ea5e9"/><text x="33" y="32" font-family="Segoe UI" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">S</text></svg>
  <div><h1>SkyCart — Ready-to-List Generator</h1><p>Auto-generate eBay descriptions & image instructions for any SKU — USA, UK, and future stock</p></div>
</div>

<!-- Stats row -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
  <div class="card" style="padding:16px"><div class="stat" id="statTotal">—</div><div class="stat-label">Total SKUs in DB</div></div>
  <div class="card" style="padding:16px"><div class="stat" id="statActive" style="color:#34d399">—</div><div class="stat-label">Active / In Stock</div></div>
  <div class="card" style="padding:16px"><div class="stat" id="statWH">—</div><div class="stat-label">Warehouses</div></div>
  <div class="card" style="padding:16px"><div class="stat" id="statCats">—</div><div class="stat-label">Categories</div></div>
</div>

<!-- Filters + Actions -->
<div class="card">
  <h2>🔍 Filter & Generate</h2>
  <div class="grid2">
    <div>
      <label>Warehouse</label>
      <select id="filterWH"><option value="">All Warehouses</option></select>
    </div>
    <div>
      <label>Category</label>
      <select id="filterCat"><option value="">All Categories</option></select>
    </div>
    <div>
      <label>Status</label>
      <select id="filterStatus">
        <option value="active">Active Only</option>
        <option value="">All (including inactive)</option>
        <option value="inactive">Inactive Only</option>
      </select>
    </div>
    <div>
      <label>Search SKU or Name</label>
      <input id="filterSearch" placeholder="e.g. TOMMY or EP-TTHS..." oninput="applyFilters()"/>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="loadSKUs()" style="flex:1">🔄 Load from Supabase</button>
    <button class="btn btn-success" onclick="generateSelected()" id="genBtn" style="flex:1" disabled>⚡ Generate Selected</button>
    <button class="btn btn-warning" onclick="generateAll()" id="genAllBtn" style="flex:1" disabled>📦 Generate ALL Filtered</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="genProgress"></div></div>
  <div id="genStatus" style="font-size:12px;color:#64748b;margin-top:4px"></div>
  <div class="log" id="genLog"></div>
</div>

<!-- Results table -->
<div class="card" id="tableCard" style="display:none">
  <h2>📋 SKU List <span id="countBadge" class="badge">0</span></h2>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="btn btn-primary" onclick="selectAll(true)" style="width:auto;padding:7px 16px;font-size:12px">Select All</button>
    <button class="btn" onclick="selectAll(false)" style="width:auto;padding:7px 16px;font-size:12px;background:#334155;color:#e2e8f0">Deselect All</button>
  </div>
  <div style="overflow-x:auto">
    <table id="skuTable">
      <thead><tr>
        <th><input type="checkbox" id="masterCheck" onchange="selectAll(this.checked)"/></th>
        <th>SKU</th><th>Name</th><th>Category</th><th>Size</th><th>Stock</th><th>Status</th><th>Warehouse</th><th>Action</th>
      </tr></thead>
      <tbody id="skuBody"></tbody>
    </table>
  </div>
</div>

<!-- Preview -->
<div class="card" id="preview">
  <h2>📄 Preview: <span id="previewTitle" style="color:#38bdf8"></span></h2>
  <div class="preview-tabs">
    <button class="tab-btn active" onclick="switchTab('desc')">Description</button>
    <button class="tab-btn" onclick="switchTab('img')">Image Instructions</button>
  </div>
  <div class="tab-content active" id="tab-desc"><pre id="descContent"></pre></div>
  <div class="tab-content" id="tab-img"><pre id="imgContent"></pre></div>
  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
    <button class="btn btn-success" onclick="downloadCurrent('desc')" style="width:auto;padding:9px 18px">⬇ Download Description.txt</button>
    <button class="btn btn-success" onclick="downloadCurrent('img')" style="width:auto;padding:9px 18px">⬇ Download Image_Instructions.txt</button>
    <button class="btn btn-warning" onclick="downloadBothCurrent()" style="width:auto;padding:9px 18px" id="zipSingleBtn">📁 Download Both as ZIP</button>
  </div>
</div>

<script>
const SB_URL = "https://hyxteancjleykldhkvfs.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5eHRlYW5jamxleWtsZGhrdmZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDQwNTksImV4cCI6MjA5MzQyMDA1OX0.tvPZFNWfXGyemglClHfbUyEeg3T2W-pTjMm9m1F2XmQ";

let ALL_SKUS = [];
let FILTERED = [];
let GENERATED = {};
let CURRENT_SKU = null;

function log(msg, cls='log-info'){
  const el=document.getElementById('genLog');
  el.innerHTML+=`<div class="${cls}">${new Date().toLocaleTimeString()} — ${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

async function sbFetch(endpoint){
  const r=await fetch(SB_URL+endpoint,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadSKUs(){
  log('Loading SKUs from Supabase...');
  document.getElementById('genBtn').disabled=true;
  document.getElementById('genAllBtn').disabled=true;
  try{
    const data=await sbFetch('/rest/v1/skus?select=*&order=sku_code.asc&limit=1000');
    ALL_SKUS=data;
    // Populate filters
    const whs=[...new Set(data.map(x=>x.warehouse).filter(Boolean))];
    const cats=[...new Set(data.map(x=>x.category).filter(Boolean))];
    const whSel=document.getElementById('filterWH');
    const catSel=document.getElementById('filterCat');
    whs.forEach(w=>{ const o=document.createElement('option'); o.value=w; o.textContent=w; whSel.appendChild(o); });
    cats.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });
    // Stats
    document.getElementById('statTotal').textContent=data.length;
    document.getElementById('statActive').textContent=data.filter(x=>x.status==='active').length;
    document.getElementById('statWH').textContent=whs.length;
    document.getElementById('statCats').textContent=cats.length;
    applyFilters();
    log(`Loaded ${data.length} SKUs from database ✓`,'log-ok');
    document.getElementById('genBtn').disabled=false;
    document.getElementById('genAllBtn').disabled=false;
  }catch(e){
    log('Error loading SKUs: '+e.message,'log-err');
  }
}

function applyFilters(){
  const wh=document.getElementById('filterWH').value;
  const cat=document.getElementById('filterCat').value;
  const status=document.getElementById('filterStatus').value;
  const search=document.getElementById('filterSearch').value.trim().toLowerCase();
  FILTERED=ALL_SKUS.filter(p=>{
    if(wh && p.warehouse!==wh) return false;
    if(cat && p.category!==cat) return false;
    if(status && p.status!==status) return false;
    if(search && !p.sku_code.toLowerCase().includes(search) && !p.name.toLowerCase().includes(search)) return false;
    return true;
  });
  renderTable();
}

document.getElementById('filterWH').addEventListener('change',applyFilters);
document.getElementById('filterCat').addEventListener('change',applyFilters);
document.getElementById('filterStatus').addEventListener('change',applyFilters);

function renderTable(){
  const tbody=document.getElementById('skuBody');
  document.getElementById('countBadge').textContent=FILTERED.length;
  document.getElementById('tableCard').style.display='block';
  tbody.innerHTML=FILTERED.map(p=>{
    const genMark=GENERATED[p.sku_code]?'<span class="badge badge-green">✓ Generated</span>':'';
    return `<tr>
      <td><input type="checkbox" class="sku-check" value="${p.sku_code}" checked/></td>
      <td><b>${p.sku_code}</b></td>
      <td>${p.name}</td>
      <td><span style="font-size:11px;color:#64748b">${p.category||'—'}</span></td>
      <td style="font-size:11px">${p.size||'—'}</td>
      <td>${p.stock??'—'}</td>
      <td><span class="badge ${p.status==='active'?'badge-green':'badge-amber'}">${p.status||'—'}</span></td>
      <td style="font-size:11px;color:#64748b">${(p.warehouse||'—').replace('Ahsan Aslam — ','')}</td>
      <td>${genMark}<button onclick="previewOne('${p.sku_code}')" style="padding:3px 10px;border:1px solid #334155;border-radius:4px;background:transparent;color:#38bdf8;cursor:pointer;font-size:11px">Preview</button></td>
    </tr>`;
  }).join('');
}

function selectAll(v){
  document.querySelectorAll('.sku-check').forEach(c=>c.checked=v);
  document.getElementById('masterCheck').checked=v;
}

// ── DESCRIPTION ENGINE ──

  if(cat==="Smocked Bags"){

function getImageInstructions(p){
  const sku=p.sku_code||''; const name=(p.name||'').trim(); const cat=p.category||''; const n=name.toUpperCase();
  const dogKeys=["RETIRED","I AM DEAF","BLIND DOG","STAFF X LAB","IN TRAINING","DO NOT FEED","DO NOT TOUCH","I NEED SPACE","SEIZURE SUPPORT","XL BULLY","AMERICAN BULL DOG","EMOTIONAL SUPPORT"];
  if(cat==="Dog Vest Patches"||dogKeys.some(k=>n.includes(k))){
    const sc=["S","M","L"].includes(p.size)?p.size:"M";
    return `IMAGE INSTRUCTIONS — ${name.toUpperCase()} Size ${sc} | SKU: ${sku}
${'='.repeat(55)}
IMAGE 1 — MAIN (MANDATORY): White background. Patch centered 80–90% frame. Text perfectly horizontal and fully legible at thumbnail size. Top-down flat lay. Min 1600x1600px.
IMAGE 2 — TEXT LEGIBILITY: Tight crop on patch text. Maximum sharpness. The message must be immediately readable at small sizes.
IMAGE 3 — HOOK-AND-LOOP BACKING: Show velcro-compatible backing on white background. Confirms attachment method.
IMAGE 4 — SIZE REFERENCE: Patch next to ruler. Consider S/M/L side by side if all sizes available.
IMAGE 5 — IN-USE LIFESTYLE (HIGH PRIORITY): Patch on real dog vest or harness loop panel. Real dog preferred. Text clearly readable. Outdoor or neutral indoor setting.
IMAGE 6 — MULTI-SIZE COMPARISON: S, M, L patches together on white background with size labels.
NOTE: Text sharpness and in-use lifestyle shot are the two highest conversion drivers for dog vest patches.`;
  }
  if(cat==="Smocked Bags"){
    const col=name.replace("Smocked Bag ","").trim();
    return `IMAGE INSTRUCTIONS — SMOCKED BAG ${col.toUpperCase()} | SKU: ${sku}
${'='.repeat(55)}
IMAGE 1 — MAIN (MANDATORY): White background. Bag upright, fully shaped, frame 80–90%. Color ${col} must appear true.
IMAGE 2 — SMOCKING TEXTURE CLOSE-UP (HERO): Macro of smocking panel. Low-angle side lighting for texture depth. Most important differentiating shot.
IMAGE 3 — INTERIOR/CAPACITY: Bag opened showing interior. Place sample items inside for scale.
IMAGE 4 — DIMENSIONS REFERENCE: Next to tape measure. Include folded and expanded views.
IMAGE 5 — LIFESTYLE: Model or mannequin carrying the bag in a market, beach, or casual outdoor setting.
IMAGE 6 — COLOR FAMILY (OPTIONAL): All color variants together for variant display.`;
  }
  if(cat==="Scarves"){
    const col=name.replace("Scarf ","").trim();
    return `IMAGE INSTRUCTIONS — SCARF ${col.toUpperCase()} | SKU: ${sku}
${'='.repeat(55)}
IMAGE 1 — MAIN (MANDATORY): White background. Scarf loosely arranged showing full color. Color ${col} must appear true.
IMAGE 2 — FABRIC TEXTURE CLOSE-UP: Close-up of weave/texture with slight side lighting.
IMAGE 3 — FULL LENGTH FLAT LAY: Scarf fully extended showing complete dimensions.
IMAGE 4 — DRAPED ARRANGEMENT: Loosely draped showing how fabric falls and moves.
IMAGE 5 — LIFESTYLE (ESSENTIAL): Model in neck wrap, shoulder drape, or head wrap style. Color should complement outfit.`;
  }
  if(cat==="Accessories"){
    const isKnife=n.includes("KNIFE");
    return `IMAGE INSTRUCTIONS — ${name.toUpperCase()} | SKU: ${sku}
${'='.repeat(55)}
IMAGE 1 — MAIN (MANDATORY): White background. Product centered, primary face showing. Min 1600x1600px.
IMAGE 2 — MULTI-ANGLE SET: Front, side profile, and rear views (3 shots or composite).
IMAGE 3 — DETAIL CLOSE-UP: ${isKnife?"Blade edge, locking mechanism, handle texture and color":"Card slots interior, stitching quality, material texture"}.
IMAGE 4 — SCALE REFERENCE: Next to credit card or ruler. Critical for accurate size perception.
IMAGE 5 — IN-USE LIFESTYLE: ${isKnife?"Knife held in hand, blade deployed for display":"Wallet in hand, cards visible in slots or placed in pocket"}.
IMAGE 6 — PACKAGING/GIFT SHOT: Any included box, case, or packaging — relevant for gift purchases.
NOTE: ${isKnife?"Use diffused lighting to avoid blade glare.":"Show RFID blocking label/badge if present — key purchase driver."}`;
  }
  // Default: embroidered patch
  const isLarge=name.toLowerCase().includes("large")||name.toLowerCase().includes("strip");
  return `IMAGE INSTRUCTIONS — ${name.toUpperCase()} | SKU: ${sku}
${'='.repeat(55)}
IMAGE 1 — MAIN (MANDATORY): Pure white background. Patch centered, 80–90% frame. Top-down flat lay. Even diffused light — no shadows on patch face. Min 1600x1600px. No watermarks.
IMAGE 2 — DESIGN DETAIL CLOSE-UP: Ultra-close crop on embroidery. Show thread density, color accuracy, merrowed border. Builds buyer confidence in quality.
IMAGE 3 — BACKING DETAIL: Flip patch — show adhesive/sew-on surface. Include any SKU label present.
IMAGE 4 — SIZE REFERENCE: Patch next to ruler or credit card showing ${p.size||'dimensions'}.
IMAGE 5 — LIFESTYLE IN-USE (HIGH IMPACT): Patch applied to ${isLarge?"jacket back or bag front panel":"denim jacket chest, sleeve, or bag"}. Clean, pressed garment. Flat lay or headless mannequin. Natural or studio lighting.
IMAGE 6 — ANGLE/TEXTURE SHOT: 30-degree angle to show 3D embossed embroidery texture.
OPTIONAL: Iron-on step-by-step (3 shots: position / press / result). Family/variant comparison shot.
NOTES: Use lightbox for consistent white. Macro lens for stitch details. Avoid auto-sharpening in post.`;
}

function previewOne(skuCode){
  const p=ALL_SKUS.find(x=>x.sku_code===skuCode);
  if(!p) return;
  CURRENT_SKU=skuCode;
  const desc=getDescription(p);
  const imgs=getImageInstructions(p);
  GENERATED[skuCode]={desc,imgs};
  document.getElementById('previewTitle').textContent=`${p.sku_code} — ${p.name}`;
  document.getElementById('descContent').textContent=desc;
  document.getElementById('imgContent').textContent=imgs;
  document.getElementById('preview').style.display='block';
  document.getElementById('preview').scrollIntoView({behavior:'smooth'});
  switchTab('desc');
  renderTable();
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['desc','img'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function downloadTxt(content, filename){
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(content);
  a.download=filename; a.click();
}

function downloadCurrent(type){
  if(!CURRENT_SKU||!GENERATED[CURRENT_SKU]) return alert('Generate or preview a SKU first');
  const g=GENERATED[CURRENT_SKU];
  if(type==='desc') downloadTxt(g.desc,`${CURRENT_SKU}_Description.txt`);
  else downloadTxt(g.imgs,`${CURRENT_SKU}_Image_Instructions.txt`);
}

async function downloadBothCurrent(){
  if(!CURRENT_SKU||!GENERATED[CURRENT_SKU]) return alert('Generate or preview a SKU first');
  const g=GENERATED[CURRENT_SKU];
  const p=ALL_SKUS.find(x=>x.sku_code===CURRENT_SKU);
  const folderName=`${p.sku_code} - ${p.name.replace(/[<>:"/\\|?*]/g,'')}`;
  const zip=new JSZip();
  const folder=zip.folder(folderName);
  folder.file("Description.txt",g.desc);
  folder.file("Image_Placeholder_Instructions.txt",g.imgs);
  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${CURRENT_SKU}_ReadyToList.zip`; a.click();
}

async function generateSelected(){
  const checked=[...document.querySelectorAll('.sku-check:checked')].map(c=>c.value);
  if(!checked.length) return alert('Select at least one SKU');
  await runGeneration(checked);
}

async function generateAll(){
  const skus=FILTERED.map(p=>p.sku_code);
  if(!skus.length) return alert('No SKUs in current filter');
  if(!confirm(`Generate and download ZIP for ${skus.length} SKUs?`)) return;
  await runGeneration(skus);
}

async function runGeneration(skuCodes){
  const btn=document.getElementById('genBtn');
  const aBtn=document.getElementById('genAllBtn');
  btn.disabled=aBtn.disabled=true;
  document.getElementById('genLog').innerHTML='';
  document.getElementById('genProgress').style.width='0%';
  log(`Starting generation for ${skuCodes.length} SKUs...`);

  const zip=new JSZip();
  let done=0;
  for(const skuCode of skuCodes){
    const p=ALL_SKUS.find(x=>x.sku_code===skuCode);
    if(!p){log(`SKU not found: ${skuCode}`,'log-warn');continue;}
    const desc=getDescription(p);
    const imgs=getImageInstructions(p);
    GENERATED[skuCode]={desc,imgs};
    const folderName=`${p.sku_code} - ${p.name.replace(/[<>:"/\\|?*]/g,'')}`;
    const folder=zip.folder('SkyCart_Ready_to_List/'+folderName);
    folder.file("Description.txt",desc);
    folder.file("Image_Placeholder_Instructions.txt",imgs);
    done++;
    const pct=Math.round(done/skuCodes.length*100);
    document.getElementById('genProgress').style.width=pct+'%';
    document.getElementById('genStatus').textContent=`Generating ${done}/${skuCodes.length}...`;
    if(done%10===0) log(`${done}/${skuCodes.length} complete...`,'log-ok');
    await new Promise(r=>setTimeout(r,0));
  }

  log('Building ZIP archive...','log-info');
  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`SkyCart_Ready_to_List_${skuCodes.length}SKUs.zip`; a.click();
  log(`✓ Done! ZIP downloaded with ${done} SKUs.`,'log-ok');
  document.getElementById('genStatus').textContent=`✓ ${done} SKUs generated and downloaded`;
  document.getElementById('genProgress').style.width='100%';
  renderTable();
  btn.disabled=aBtn.disabled=false;
}

// Auto-load on page open
window.addEventListener('load',()=>{ loadSKUs(); });
</script>
